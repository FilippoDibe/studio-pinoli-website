<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#04102a"/>
      <stop offset="100%" stop-color="#0c2e6a"/>
    </linearGradient>
    <radialGradient id="halo2" cx="400" cy="280" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa28"/>
      <stop offset="100%" stop-color="#60a5fa00"/>
    </radialGradient>
    <linearGradient id="alignerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa30"/>
      <stop offset="100%" stop-color="#60a5fa08"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bg2)"/>
  <ellipse cx="400" cy="290" rx="280" ry="220" fill="url(#halo2)"/>

  <!-- Grid -->
  <g stroke="#60a5fa08" stroke-width="1" fill="none">
    <line x1="0" y1="130" x2="800" y2="130"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="390" x2="800" y2="390"/>
    <line x1="200" y1="0" x2="200" y2="520"/>
    <line x1="400" y1="0" x2="400" y2="520"/>
    <line x1="600" y1="0" x2="600" y2="520"/>
  </g>

  <!-- DENTAL ARCH — 8 teeth in horseshoe arrangement, viewed from front/above -->
  <!-- Upper arch base line -->
  <path d="M148,340 C148,190 230,100 400,85 C570,100 652,190 652,340"
    fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

  <!-- TEETH — 8 individual rectangles along the arch -->
  <!-- Positioning: bottom of each tooth sits on the arch curve, teeth point outward from center -->

  <!-- Tooth 1 — far left (molar) -->
  <g transform="translate(168,278) rotate(-28)">
    <rect x="-18" y="-50" width="36" height="52" rx="5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
    <line x1="-6" y1="-50" x2="-6" y2="2" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="6" y1="-50" x2="6" y2="2" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="-18" y1="-20" x2="18" y2="-20" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>
  <!-- Tooth 2 — premolar left -->
  <g transform="translate(222,222) rotate(-15)">
    <rect x="-16" y="-52" width="32" height="54" rx="5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
    <line x1="0" y1="-52" x2="0" y2="2" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <line x1="-16" y1="-22" x2="16" y2="-22" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>
  <!-- Tooth 3 — canine left -->
  <g transform="translate(286,185) rotate(-5)">
    <rect x="-13" y="-54" width="26" height="56" rx="5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
    <path d="M-13,-54 L0,-66 L13,-54" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <!-- Tooth 4 — lateral incisor left -->
  <g transform="translate(340,170) rotate(2)">
    <rect x="-11" y="-52" width="22" height="54" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  </g>
  <!-- Tooth 5 — central incisor right -->
  <g transform="translate(400,165) rotate(0)">
    <rect x="-13" y="-54" width="26" height="56" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.75)" stroke-width="2.2"/>
  </g>
  <!-- Tooth 6 — lateral incisor right -->
  <g transform="translate(460,170) rotate(-2)">
    <rect x="-11" y="-52" width="22" height="54" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  </g>
  <!-- Tooth 7 — canine right -->
  <g transform="translate(514,185) rotate(5)">
    <rect x="-13" y="-54" width="26" height="56" rx="5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
    <path d="M-13,-54 L0,-66 L13,-54" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <!-- Tooth 8 — premolar right -->
  <g transform="translate(572,222) rotate(16)">
    <rect x="-16" y="-52" width="32" height="54" rx="5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
    <line x1="0" y1="-52" x2="0" y2="2" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <line x1="-16" y1="-22" x2="16" y2="-22" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>
  <!-- Tooth 9 — molar right -->
  <g transform="translate(628,278) rotate(29)">
    <rect x="-18" y="-50" width="36" height="52" rx="5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.65)" stroke-width="2"/>
    <line x1="-6" y1="-50" x2="-6" y2="2" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="6" y1="-50" x2="6" y2="2" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="-18" y1="-20" x2="18" y2="-20" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>

  <!-- ALIGNER TRAY — slightly larger, transparent blue outline -->
  <path d="M128,345 C125,185 215,88 400,72 C585,88 675,185 672,345"
    fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.75" stroke-linejoin="round"/>
  <!-- Aligner side walls (bottom edges) -->
  <path d="M128,345 L128,375 C130,385 142,392 158,390"
    fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>
  <path d="M672,345 L672,375 C670,385 658,392 642,390"
    fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>
  <!-- Aligner bottom rim -->
  <path d="M158,390 C220,405 300,412 400,412 C500,412 580,405 642,390"
    fill="none" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>

  <!-- Gum line arc -->
  <path d="M150,350 C200,370 300,382 400,382 C500,382 600,370 650,350"
    fill="rgba(255,200,200,0.08)" stroke="rgba(255,180,180,0.25)" stroke-width="2"/>

  <!-- Smile curve indicator -->
  <path d="M250,440 C300,470 500,470 550,440"
    fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.45" stroke-dasharray="8,6"/>

  <!-- Dots along aligner edge -->
  <circle cx="128" cy="345" r="4" fill="#60a5fa" opacity="0.6"/>
  <circle cx="672" cy="345" r="4" fill="#60a5fa" opacity="0.6"/>
  <circle cx="400" cy="72" r="4" fill="#60a5fa" opacity="0.6"/>

  <!-- Sparkle decorations -->
  <g transform="translate(118,118)" opacity="0.7">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#60a5fa" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#60a5fa" stroke-width="1.3" stroke-linecap="round"/>
  </g>
  <g transform="translate(690,115)" opacity="0.55">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-9" y1="-9" x2="9" y2="9" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <g transform="translate(720,430)" opacity="0.45">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#60a5fa30" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M22,42 L42,42 L42,22"/>
    <path d="M778,42 L758,42 L758,22"/>
    <path d="M22,478 L42,478 L42,498"/>
    <path d="M778,478 L758,478 L758,498"/>
  </g>
</svg>
