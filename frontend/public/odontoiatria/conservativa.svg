    <line x1="-9" y1="-9" x2="9" y2="9" stroke="#3ab4f2" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="#3ab4f2" stroke-width="1.2" stroke-linecap="round"/>
