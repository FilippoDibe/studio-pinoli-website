  <path d="M320,168 C310,145 316,112 337,94 C351,83 373,75 422,75 C471,75 493,83 507,94 C528,112 534,145 524,168 L524,272 C524,291 510,302 488,302 L356,302 C334,302 320,291 320,272 Z"
