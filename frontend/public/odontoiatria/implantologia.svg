<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060c14"/>
      <stop offset="100%" stop-color="#0e2a44"/>
    </linearGradient>
    <radialGradient id="halo3" cx="400" cy="260" r="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e6a02022"/>
      <stop offset="100%" stop-color="#e6a02000"/>
    </radialGradient>
    <linearGradient id="bone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6a02015"/>
      <stop offset="100%" stop-color="#e6a02005"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bg3)"/>
  <ellipse cx="400" cy="265" rx="260" ry="220" fill="url(#halo3)"/>

  <!-- Grid -->
  <g stroke="#e6a02008" stroke-width="1" fill="none">
    <line x1="0" y1="130" x2="800" y2="130"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="390" x2="800" y2="390"/>
    <line x1="200" y1="0" x2="200" y2="520"/>
    <line x1="400" y1="0" x2="400" y2="520"/>
    <line x1="600" y1="0" x2="600" y2="520"/>
  </g>

  <!-- CROSS-SECTION JAW BONE — center -->
  <!-- Jaw bone outer shape -->
  <path d="M180,300 L180,420 C180,450 200,470 230,470 L570,470 C600,470 620,450 620,420 L620,300 C620,260 580,230 530,225 L270,225 C220,230 180,260 180,300 Z"
    fill="rgba(230,160,32,0.06)" stroke="rgba(230,160,32,0.3)" stroke-width="2" stroke-linejoin="round"/>
  <!-- Bone marrow texture (dots) -->
  <g fill="rgba(230,160,32,0.12)">
    <circle cx="250" cy="350" r="5"/><circle cx="280" cy="380" r="4"/><circle cx="310" cy="410" r="6"/>
    <circle cx="340" cy="360" r="4"/><circle cx="370" cy="440" r="5"/><circle cx="310" cy="450" r="3"/>
    <circle cx="460" cy="350" r="5"/><circle cx="490" cy="380" r="4"/><circle cx="520" cy="410" r="6"/>
    <circle cx="450" cy="430" r="4"/><circle cx="540" cy="440" r="5"/><circle cx="480" cy="455" r="3"/>
    <circle cx="230" cy="420" r="4"/><circle cx="590" cy="420" r="4"/>
  </g>
  <!-- Cortical bone top edge -->
  <path d="M180,300 L620,300"
    fill="none" stroke="rgba(230,160,32,0.4)" stroke-width="2.5" stroke-dasharray="10,6"/>
  <!-- Gum tissue above bone -->
  <path d="M170,240 C200,205 300,185 400,182 C500,185 600,205 630,240 L630,300 L170,300 Z"
    fill="rgba(255,160,160,0.06)" stroke="rgba(255,180,180,0.2)" stroke-width="1.5"/>

  <!-- IMPLANT SCREW — large central element -->
  <!-- Titanium screw body -->
  <!-- Head/cap -->
  <rect x="374" y="88" width="52" height="28" rx="6" fill="rgba(230,160,32,0.15)" stroke="#e6a020" stroke-width="2.2"/>
  <!-- Hex cross on cap -->
  <line x1="400" y1="88" x2="400" y2="116" stroke="#e6a020" stroke-width="1.5" opacity="0.7"/>
  <line x1="384" y1="102" x2="416" y2="102" stroke="#e6a020" stroke-width="1.5" opacity="0.7"/>
  <!-- Abutment connector -->
  <path d="M386,116 L386,150 C386,156 390,160 400,160 C410,160 414,156 414,150 L414,116 Z"
    fill="rgba(230,160,32,0.12)" stroke="#e6a020" stroke-width="2.2"/>
  <!-- Crown base platform -->
  <rect x="368" y="152" width="64" height="20" rx="4" fill="rgba(230,160,32,0.15)" stroke="#e6a020" stroke-width="2.2"/>

  <!-- CROWN on top -->
  <path d="M358,172 L365,140 L376,158 L390,118 L400,138 L410,118 L424,158 L435,140 L442,172 Z"
    fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.75)" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M358,172 L442,172 L442,210 C442,220 432,228 420,228 L380,228 C368,228 358,220 358,210 Z"
    fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.65)" stroke-width="2.2"/>

  <!-- Implant screw body (in bone) -->
  <!-- Screw cylinder -->
  <rect x="388" y="228" width="24" height="180" rx="4" fill="rgba(230,160,32,0.1)" stroke="#e6a020" stroke-width="2"/>
  <!-- Screw threads (horizontal lines) -->
  <g stroke="#e6a020" stroke-width="1.5" opacity="0.7">
    <path d="M384,248 L388,248 M412,248 L416,248"/>
    <path d="M382,262 L388,262 M412,262 L418,262"/>
    <path d="M381,276 L388,276 M412,276 L419,276"/>
    <path d="M381,290 L388,290 M412,290 L419,290"/>
    <path d="M382,304 L388,304 M412,304 L418,304"/>
    <path d="M383,318 L388,318 M412,318 L417,318"/>
    <path d="M384,332 L388,332 M412,332 L416,332"/>
    <path d="M385,346 L388,346 M412,346 L415,346"/>
    <path d="M386,360 L388,360 M412,360 L414,360"/>
    <path d="M387,374 L388,374 M412,374 L413,374"/>
    <path d="M387,388 L388,388 M412,388 L413,388"/>
  </g>
  <!-- Thread zigzag -->
  <path d="M384,240 L388,248 L384,256 L388,264 L384,272 L388,280 L384,288 L388,296 L384,304 L388,312 L384,320 L388,328 L384,336 L388,344 L384,352 L388,360 L384,368 L388,376 L384,384 L388,392 L386,400"
    fill="none" stroke="#e6a020" stroke-width="1.2" opacity="0.5"/>
  <path d="M416,240 L412,248 L416,256 L412,264 L416,272 L412,280 L416,288 L412,296 L416,304 L412,312 L416,320 L412,328 L416,336 L412,344 L416,352 L412,360 L416,368 L412,376 L416,384 L412,392 L414,400"
    fill="none" stroke="#e6a020" stroke-width="1.2" opacity="0.5"/>
  <!-- Screw tip -->
  <path d="M388,408 L400,420 L412,408"
    fill="rgba(230,160,32,0.2)" stroke="#e6a020" stroke-width="2"/>

  <!-- Osseointegration halos (bone growing around screw) -->
  <ellipse cx="400" cy="300" rx="28" ry="8" fill="rgba(230,160,32,0.08)" stroke="#e6a020" stroke-width="1" opacity="0.4"/>
  <ellipse cx="400" cy="350" rx="26" ry="7" fill="rgba(230,160,32,0.08)" stroke="#e6a020" stroke-width="1" opacity="0.3"/>

  <!-- Measurement lines -->
  <line x1="455" y1="88" x2="455" y2="420" stroke="#e6a020" stroke-width="1" opacity="0.3" stroke-dasharray="3,5"/>
  <line x1="448" y1="88" x2="462" y2="88" stroke="#e6a020" stroke-width="1.5" opacity="0.5"/>
  <line x1="448" y1="420" x2="462" y2="420" stroke="#e6a020" stroke-width="1.5" opacity="0.5"/>

  <!-- Sparkles / titanium particles -->
  <g transform="translate(620,105)" opacity="0.75">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#e6a020" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#e6a020" stroke-width="2" stroke-linecap="round"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#e6a020" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#e6a020" stroke-width="1.3" stroke-linecap="round"/>
  </g>
  <g transform="translate(160,135)" opacity="0.5">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#e6a020" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#e6a020" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <g transform="translate(680,430)" opacity="0.4">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#e6a020" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#e6a020" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#e6a020" stroke-width="1" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#e6a020" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#e6a02030" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M22,42 L42,42 L42,22"/>
    <path d="M778,42 L758,42 L758,22"/>
    <path d="M22,478 L42,478 L42,498"/>
    <path d="M778,478 L758,478 L758,498"/>
  </g>
</svg>
