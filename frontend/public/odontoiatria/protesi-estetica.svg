<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e0520"/>
      <stop offset="100%" stop-color="#2a0d55"/>
    </linearGradient>
    <radialGradient id="halo4" cx="400" cy="250" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc28"/>
      <stop offset="100%" stop-color="#c084fc00"/>
    </radialGradient>
    <radialGradient id="crownGlow" cx="400" cy="220" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc20"/>
      <stop offset="100%" stop-color="#c084fc00"/>
    </radialGradient>
    <radialGradient id="smileGlow" cx="400" cy="380" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff08"/>
      <stop offset="100%" stop-color="#ffffff00"/>
    </radialGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bg4)"/>
  <ellipse cx="400" cy="255" rx="280" ry="230" fill="url(#halo4)"/>
  <ellipse cx="400" cy="220" rx="150" ry="120" fill="url(#crownGlow)"/>

  <!-- Grid -->
  <g stroke="#c084fc08" stroke-width="1" fill="none">
    <line x1="0" y1="130" x2="800" y2="130"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="390" x2="800" y2="390"/>
    <line x1="200" y1="0" x2="200" y2="520"/>
    <line x1="400" y1="0" x2="400" y2="520"/>
    <line x1="600" y1="0" x2="600" y2="520"/>
  </g>

  <!-- SMILE backdrop — lips silhouette (large, background, ghost) -->
  <path d="M180,360 C200,320 260,295 320,302 C355,306 380,318 400,330 C420,318 445,306 480,302 C540,295 600,320 620,360 C590,400 530,428 480,432 C450,435 425,425 400,410 C375,425 350,435 320,432 C270,428 210,400 180,360 Z"
    fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <!-- Cupid bow upper lip -->
  <path d="M260,320 C300,298 350,295 370,308 C380,298 400,290 400,290 C400,290 420,298 430,308 C450,295 500,298 540,320"
    fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- TEETH in smile — 6 upper teeth visible -->
  <g fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.65)" stroke-width="2" stroke-linejoin="round">
    <!-- Tooth 1 -->
    <path d="M290,332 L295,310 L312,308 L318,332 C316,342 310,346 304,344 C298,342 290,342 290,332 Z"/>
    <!-- Tooth 2 -->
    <path d="M320,332 L319,306 L336,304 L337,330 C337,342 332,346 328,345 C324,344 320,342 320,332 Z"/>
    <!-- Central 1 (featured with crown) -->
    <path d="M339,330 L339,302 L357,300 L359,328 C360,342 356,348 350,347 C344,346 339,342 339,330 Z"/>
    <!-- Central 2 (featured) -->
    <path d="M361,328 L363,300 L381,302 L381,330 C381,342 376,346 370,347 C364,348 360,342 361,328 Z"/>
    <!-- Tooth 5 -->
    <path d="M383,330 L384,304 L401,306 L400,332 C400,342 396,344 390,345 C384,346 383,342 383,330 Z"/>
    <!-- Tooth 6 -->
    <path d="M402,332 L403,308 L420,310 L421,332 C421,342 416,342 410,344 C404,346 402,342 402,332 Z"/>
  </g>

  <!-- CROWN — large, centered above smile, main hero element -->
  <!-- Crown body -->
  <path d="M328,160 L340,90 L356,130 L380,72 L400,108 L420,72 L444,130 L460,90 L472,160 Z"
    fill="rgba(192,132,252,0.12)" stroke="#c084fc" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Crown band (lower rim) -->
  <rect x="326" y="158" width="148" height="28" rx="6"
    fill="rgba(192,132,252,0.12)" stroke="#c084fc" stroke-width="2.2"/>
  <!-- Crown occlusal surface -->
  <path d="M336,186 L336,232 C336,248 345,260 360,265 L440,265 C455,260 464,248 464,232 L464,186 Z"
    fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linejoin="round"/>
  <!-- Crown grooves -->
  <path d="M370,200 L390,220 L410,200" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <path d="M400,186 L400,265" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Crown shine highlights -->
  <path d="M340,100 C345,115 352,128 346,145" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
  <path d="M356,85 C360,98 364,110 360,125" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Shine / glow on teeth -->
  <ellipse cx="400" cy="220" rx="80" ry="30" fill="rgba(255,255,255,0.06)"/>

  <!-- SPARKLES — beauty/whitening symbolism -->
  <!-- Large sparkle top-right -->
  <g transform="translate(590,80)" opacity="0.85">
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#c084fc" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#c084fc" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-14" y1="-14" x2="14" y2="14" stroke="#c084fc" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="14" y1="-14" x2="-14" y2="14" stroke="#c084fc" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="5" fill="#c084fc35"/>
  </g>
  <!-- Medium sparkle top-left -->
  <g transform="translate(185,105)" opacity="0.65">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Small sparkles scattered -->
  <g transform="translate(644,195)" opacity="0.55">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <g transform="translate(135,290)" opacity="0.45">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <g transform="translate(700,380)" opacity="0.5">
    <line x1="0" y1="-13" x2="0" y2="13" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Tiny dots -->
  <circle cx="260" cy="80" r="3" fill="#c084fc" opacity="0.4"/>
  <circle cx="540" cy="72" r="2.5" fill="#c084fc" opacity="0.35"/>
  <circle cx="660" cy="290" r="2.5" fill="#c084fc" opacity="0.3"/>
  <circle cx="110" cy="400" r="2" fill="#c084fc" opacity="0.3"/>

  <!-- Diamond shape accent -->
  <path d="M400,48 L415,68 L400,88 L385,68 Z"
    fill="rgba(192,132,252,0.15)" stroke="#c084fc" stroke-width="1.5" opacity="0.7"/>

  <!-- Corner brackets -->
  <g stroke="#c084fc28" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M22,42 L42,42 L42,22"/>
    <path d="M778,42 L758,42 L758,22"/>
    <path d="M22,478 L42,478 L42,498"/>
    <path d="M778,478 L758,478 L758,498"/>
  </g>
</svg>
