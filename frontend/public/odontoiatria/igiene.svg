<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#031510"/>
      <stop offset="100%" stop-color="#063d28"/>
    </linearGradient>
    <radialGradient id="halo5" cx="400" cy="250" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d39928"/>
      <stop offset="100%" stop-color="#34d39900"/>
    </radialGradient>
    <radialGradient id="shieldGlow" cx="400" cy="240" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d39918"/>
      <stop offset="100%" stop-color="#34d39900"/>
    </radialGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bg5)"/>
  <ellipse cx="400" cy="255" rx="270" ry="225" fill="url(#halo5)"/>
  <ellipse cx="400" cy="240" rx="175" ry="160" fill="url(#shieldGlow)"/>

  <!-- Grid -->
  <g stroke="#34d39908" stroke-width="1" fill="none">
    <line x1="0" y1="130" x2="800" y2="130"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="390" x2="800" y2="390"/>
    <line x1="200" y1="0" x2="200" y2="520"/>
    <line x1="400" y1="0" x2="400" y2="520"/>
    <line x1="600" y1="0" x2="600" y2="520"/>
  </g>

  <!-- GUM LINE — horizontal wave background -->
  <path d="M0,380 C60,360 100,368 150,360 C200,352 240,368 300,360 C360,352 390,368 400,362 C410,368 440,352 500,360 C560,368 600,352 650,360 C700,368 740,360 800,380 L800,520 L0,520 Z"
    fill="rgba(52,211,153,0.06)" stroke="rgba(52,211,153,0.2)" stroke-width="2"/>

  <!-- TOOTH — large, center, emerging from gum -->
  <!-- Root (below gum line, semi-transparent) -->
  <path d="M374,390 L366,460 C363,490 374,510 390,512 C400,513 410,513 414,512 C430,510 441,490 438,460 L430,390 Z"
    fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,5"/>

  <!-- Crown (above gum) -->
  <path d="M358,180 C340,160 345,120 368,98 C380,86 394,80 400,80 C406,80 420,86 432,98 C455,120 460,160 442,180 L442,370 C442,382 432,390 420,390 L380,390 C368,390 358,382 358,370 Z"
    fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Tooth inner highlight -->
  <path d="M368,185 L368,350" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="6"/>
  <!-- Enamel shine -->
  <path d="M366,115 C370,128 372,145 368,165" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M378,100 C382,112 383,128 380,148" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- SHIELD — large, overlaid on tooth, protective -->
  <path d="M280,108 L400,62 L520,108 L520,268 C520,340 400,400 400,400 C400,400 280,340 280,268 Z"
    fill="rgba(52,211,153,0.07)" stroke="#34d399" stroke-width="2.8" stroke-linejoin="round" opacity="0.85"/>
  <!-- Shield inner border -->
  <path d="M296,118 L400,78 L504,118 L504,264 C504,328 400,384 400,384 C400,384 296,328 296,264 Z"
    fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.4"/>

  <!-- Checkmark inside shield -->
  <path d="M350,240 L382,275 L458,195"
    fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- BACTERIA / MICROBE indicators being blocked (outside shield, crossed out) -->
  <!-- Left side bacteria -->
  <g transform="translate(210,180)" opacity="0.5">
    <circle cx="0" cy="0" r="14" fill="none" stroke="rgba(255,80,80,0.6)" stroke-width="1.5"/>
    <line x1="-9" y1="-9" x2="9" y2="9" stroke="rgba(255,80,80,0.6)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="rgba(255,80,80,0.6)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="6" cy="-18" r="4" fill="none" stroke="rgba(255,80,80,0.5)" stroke-width="1.2"/>
    <circle cx="-8" cy="-16" r="3" fill="none" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  </g>
  <!-- Right side bacteria -->
  <g transform="translate(590,195)" opacity="0.5">
    <circle cx="0" cy="0" r="12" fill="none" stroke="rgba(255,80,80,0.55)" stroke-width="1.5"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="rgba(255,80,80,0.55)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="rgba(255,80,80,0.55)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-5" cy="-16" r="3.5" fill="none" stroke="rgba(255,80,80,0.45)" stroke-width="1"/>
  </g>

  <!-- Health plus signs -->
  <g transform="translate(660,115)" opacity="0.6">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(130,150)" opacity="0.5">
    <line x1="0" y1="-11" x2="0" y2="11" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(700,390)" opacity="0.45">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Sparkles — clean/health -->
  <g transform="translate(590,420)" opacity="0.7">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#34d399" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#34d399" stroke-width="1.3" stroke-linecap="round"/>
  </g>
  <g transform="translate(160,420)" opacity="0.5">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#34d399" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#34d399" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#34d399" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#34d399" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Bubble particles (cleaning effect) -->
  <circle cx="488" cy="148" r="8" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.4"/>
  <circle cx="510" cy="108" r="5" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.35"/>
  <circle cx="468" cy="110" r="6" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.3"/>
  <circle cx="302" cy="148" r="7" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.35"/>
  <circle cx="282" cy="110" r="5" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.3"/>

  <!-- Corner brackets -->
  <g stroke="#34d39928" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M22,42 L42,42 L42,22"/>
    <path d="M778,42 L758,42 L758,22"/>
    <path d="M22,478 L42,478 L42,498"/>
    <path d="M778,478 L758,478 L758,498"/>
  </g>
</svg>
